<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact & Order</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<header>
    <h1>Contact & Order 🍔</h1>
    <nav>
        <a href="../index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="contact-container">

    <!-- CONTACT FORM -->
    <div class="box">
        <h2>Contact Us ✉️</h2>

        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <input type="text" placeholder="Phone Number" required>
            <textarea placeholder="Message..." rows="4"></textarea>

            <button type="submit">Send Message</button>
        </form>
    </div>

    <!-- ORDER / PANIER -->
    <div class="box">
        <h2>Your Order 🛒</h2>

        <label>Choose Meal:</label>
        <select id="meal">
            <option value="30">🍕 Pizza - 30 DT</option>
            <option value="35">🍝 Pasta - 35 DT</option>
            <option value="25">🍔 Burger - 25 DT</option>
            <option value="18">🥗 Salad - 18 DT</option>
        </select>

        <label>Quantity:</label>
        <input type="number" id="qty" value="1" min="1">

        <button onclick="addToCart()">Add to Cart</button>

        <div class="cart">
            <h3>Panier 🧾</h3>
            <ul id="cart-list"></ul>
            <p><strong>Total: <span id="total">0</span> DT</strong></p>
        </div>
    </div>

</section>

<script>
let total = 0;

function addToCart() {
    const meal = document.getElementById("meal");
    const price = parseInt(meal.value);
    const name = meal.options[meal.selectedIndex].text;
    const qty = parseInt(document.getElementById("qty").value);

    const list = document.getElementById("cart-list");

    const li = document.createElement("li");
    li.textContent = `${name} x ${qty}`;
    list.appendChild(li);

    total += price * qty;
    document.getElementById("total").textContent = total;
}
</script>

</body>
</html>
